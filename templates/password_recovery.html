<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monkeys - שחזור סיסמה</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🐒 שחזור סיסמה</h1>
      </div>

      {% if token_verified and token %}
        <form id="resetForm" class="auth-form">
          <input type="hidden" id="reset_token" value="{{ token }}">
          <div class="form-group">
            <label for="new_password">סיסמה חדשה</label>
            <input type="password" id="new_password" name="password" required>
          </div>
          <div class="form-group">
            <label for="confirm_password">אימות סיסמה חדשה</label>
            <input type="password" id="confirm_password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">שנה סיסמה</button>
          <div id="resetMessage" class="form-message"></div>
        </form>
        <script>
          document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('resetMessage');
            const pw = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (pw !== confirm) {
              msg.textContent = 'הסיסמאות אינן תואמות.';
              msg.className = 'form-message error';
              return;
            }
            try {
              const resp = await fetch('/api/reset_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: document.getElementById('reset_token').value, password: pw }),
              });
              const result = await resp.json();
              if (result.response === 'success') {
                msg.textContent = 'הסיסמה שונתה בהצלחה!';
                msg.className = 'form-message success';
                setTimeout(() => window.location.href = '/login', 1500);
              } else {
                msg.textContent = result.response;
                msg.className = 'form-message error';
              }
            } catch (err) {
              msg.textContent = 'שגיאה.';
              msg.className = 'form-message error';
            }
          });
        </script>
      {% else %}
        <form id="recoveryForm" class="auth-form">
          <div class="form-group">
            <label for="rec_username">שם משתמש</label>
            <input type="text" id="rec_username" name="username" required placeholder="הכנס שם משתמש">
          </div>
          <button type="submit" class="btn btn-primary btn-full">שלח קישור איפוס</button>
          <div id="recoveryMessage" class="form-message"></div>
        </form>
        <script>
          document.getElementById('recoveryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('recoveryMessage');
            try {
              const resp = await fetch('/api/send_verification_email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('rec_username').value }),
              });
              const result = await resp.json();
              if (result.response === 'success') {
                msg.textContent = 'קישור איפוס נשלח! (בדוק את הקונסול של השרת)';
                msg.className = 'form-message success';
              } else {
                msg.textContent = result.response;
                msg.className = 'form-message error';
              }
            } catch (err) {
              msg.textContent = 'שגיאה.';
              msg.className = 'form-message error';
            }
          });
        </script>
      {% endif %}

      <div class="auth-footer">
        <a href="{{ url_for('pages.login') }}">חזרה לכניסה</a>
      </div>
    </div>
  </div>
</body>
</html>
